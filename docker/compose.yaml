# Standalone deployment for HA Container/Core, or to run the TUI web terminal
# anywhere on the network and point the add-on (mode: proxy) or a webpage card
# at it. Copy .env.example to .env and fill in the RPC password first.
services:
  gridcoin-tui:
    build: .
    container_name: gridcoin-tui
    restart: unless-stopped
    ports:
      - "7681:7681"
    environment:
      GRC_RPC_HOST: ${GRC_RPC_HOST:-192.0.2.10}
      GRC_RPC_PORT: ${GRC_RPC_PORT:-15715}
      GRC_RPC_USER: ${GRC_RPC_USER:-grc-tui}
      GRC_RPC_PASSWORD: ${GRC_RPC_PASSWORD:?set GRC_RPC_PASSWORD in .env}
      REFRESH: ${REFRESH:-10s}

  # Optional: the Gridcoin Web Client GUI as a second "whole wallet" view.
  # Build instructions and config live in its own repo:
  #   https://github.com/rsparlin/Gridcoin-Web-Client
  # Clone it next to this file, then uncomment and adjust:
  #
  # gridcoin-web-client:
  #   build: ./Gridcoin-Web-Client
  #   container_name: gridcoin-web-client
  #   restart: unless-stopped
  #   ports:
  #     - "8080:80"
