name: Gridcoin TUI
version: "0.2.0"
slug: gridcoin_tui
description: >-
  Web terminal exposing the Gridcoin Research TUI, embeddable in Lovelace
  dashboards through Home Assistant ingress.
url: https://github.com/goldsteal/ha-grc
arch:
  - aarch64
  - amd64
  - armv7
  - i386
init: false
ingress: true
ingress_port: 7681
# ttyd is also published directly on a host port so the terminal can be
# embedded in a Lovelace iframe card (HA ingress can't be iframed without a
# sidebar panel + a session cookie). NOTE: this exposes the writable wallet
# terminal on the LAN without Home Assistant authentication.
ports:
  "7681/tcp": 7681
ports_description:
  "7681/tcp": "ttyd web terminal (direct, unauthenticated — for dashboard embedding)"
# panel_icon/panel_title only matter when the ingress sidebar panel is enabled
# (ingress_panel); access is via the dashboard "Terminal" tab instead.
panel_icon: grc:gridcoin
panel_title: Gridcoin TUI
options:
  mode: internal
  rpc_host: 192.0.2.10
  rpc_port: 15715
  rpc_user: grc-tui
  rpc_password: ""
  refresh: 10s
  external_ttyd_url: ""
schema:
  mode: list(internal|proxy)
  rpc_host: str
  rpc_port: port
  rpc_user: str
  rpc_password: password
  refresh: str
  external_ttyd_url: str?
