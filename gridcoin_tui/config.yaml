name: Gridcoin TUI
version: "0.1.4"
slug: gridcoin_tui
description: >-
  Web terminal exposing the Gridcoin Research TUI, embeddable in Lovelace
  dashboards through Home Assistant ingress.
url: https://github.com/goldsteal/ha-grc
arch:
  - amd64
init: false
ingress: true
ingress_port: 7681
# Real Gridcoin logo. Resolves in the sidebar because the gridcoin_icons
# integration (custom_components/) loads grc-icons.js via add_extra_js_url at
# frontend startup, before the sidebar renders. Without that integration this
# would render blank (a Lovelace resource loads too late for the sidebar).
panel_icon: grc:gridcoin
panel_title: Gridcoin TUI
options:
  mode: internal
  rpc_host: 192.0.2.10
  rpc_port: 15715
  rpc_user: grc-tui
  rpc_password: ""
  refresh: 10s
  external_ttyd_url: ""
schema:
  mode: list(internal|proxy)
  rpc_host: str
  rpc_port: port
  rpc_user: str
  rpc_password: password
  refresh: str
  external_ttyd_url: str?
